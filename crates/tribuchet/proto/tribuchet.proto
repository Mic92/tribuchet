syntax = "proto3";

package tribuchet.v1;

// Worker-facing service. Workers dial the hub and keep a long-lived
// bidirectional stream open (NAT-friendly; the hub never dials workers).
service WorkerHub {
  // Single bidi stream multiplexing registration, heartbeats, build
  // assignment, path negotiation, NAR transfer, logs and results.
  rpc Session(stream WorkerMessage) returns (stream HubMessage);
}

message WorkerMessage {
  oneof msg {
    Register register = 1;
    Heartbeat heartbeat = 2;
    // Subset of the offered input paths the worker does not have cached.
    MissingPaths missing_paths = 3;
    LogChunk log = 4;
    BuildResult result = 5;
    // Output NARs streamed back after BuildResult announces them.
    NarTransfer nar = 6;
    // One free build slot: the hub answers each request with at most
    // one BuildAssignment (worker-side admission).
    RequestJob request_job = 7;
    // Answer to a BuildAssignment whose dedupe_key matches a build the
    // worker already runs (or has finished but not delivered): the hub
    // skips staging and waits for the result, which arrives under the
    // new build_id. This is how builds survive a hub restart.
    Resumed resumed = 8;
  }
}

message Resumed {
  string build_id = 1;
}

message RequestJob {}

message HubMessage {
  oneof msg {
    BuildAssignment assignment = 1;
    // Input closure of an assigned build; worker answers MissingPaths.
    PathOffer path_offer = 2;
    NarTransfer nar = 3;
    // topTmpDir contents (structured attrs, passAsFile files).
    TmpDirArchive tmp_dir = 4;
    CancelBuild cancel = 5;
    // Nix db metadata for an input path, sent before its NarTransfer
    // chunks; the worker needs it to register the path in its own
    // store via the daemon (AddToStoreNar).
    PathInfoMsg path_info = 6;
    // The hub received and verified the result and output NARs; the
    // worker keeps the build for redelivery until this arrives.
    ResultAck result_ack = 7;
  }
}

message ResultAck {
  string build_id = 1;
  // Stable identity of the build on the worker; build_id rotates when
  // a build is resumed under a new assignment.
  string dedupe_key = 2;
}

// Subset of Nix's ValidPathInfo needed to import a NAR on the worker.
message PathInfoMsg {
  string build_id = 1;
  string store_path = 2;
  bytes nar_sha256 = 3;          // hash of the uncompressed NAR
  uint64 nar_size = 4;           // uncompressed NAR size in bytes
  repeated string references = 5; // absolute store paths
  repeated string signatures = 6; // Nix-format "name:base64"
  string deriver = 7;             // absolute store path or empty
  string ca = 8;                  // content address string or empty
}

// Features are per system: an emulated system must not inherit e.g.
// "kvm" from the host.
message SystemCaps {
  string system = 1;            // e.g. "x86_64-linux"
  repeated string features = 2; // e.g. "kvm", "big-parallel"
}

message Register {
  // 2, 3: flat systems + features lists; 4: max_jobs (see RequestJob)
  reserved 2, 3, 4;
  string worker_name = 1;
  repeated SystemCaps caps = 6;
  // Dedupe keys of builds this worker still holds (running or finished
  // but undelivered). A freshly started hub assigns resubmitted jobs
  // with these keys to this worker, credit-free, instead of building
  // them again elsewhere.
  repeated string resumable_keys = 7;
  // ed25519 public key used to sign output NARs, in Nix's
  // "name:base64" format (nix-store --generate-binary-cache-key).
  string signing_public_key = 5;
  // Advisory capacity, summed across workers to size the max-jobs of
  // the generated nix.conf fragment. Not the RequestJob dispatch path.
  uint32 max_jobs = 8;
}

message Heartbeat {
  uint32 running_jobs = 1;
  double load1 = 2;
}

message BuildAssignment {
  string build_id = 1;
  string system = 2;
  string builder = 3;
  repeated string args = 4;
  map<string, string> env = 5;
  // Scratch output paths, identical on client and worker.
  map<string, string> outputs = 6;
  string tmp_dir_in_sandbox = 7; // "/build"
  string store_dir = 8; // "/nix/store"
  bool fixed_output = 9; // grants network inside the sandbox
  // Hash of the full BuildRequest; stable across hub restarts, unlike
  // build_id. Keys the worker's resume bookkeeping.
  string dedupe_key = 10;
}

message PathOffer {
  string build_id = 1;
  repeated string store_paths = 2;
}

message MissingPaths {
  string build_id = 1;
  repeated string store_paths = 2;
}

// One store path or output, streamed as a zstd-compressed NAR.
// `payload` is a oneof so a chunked CAS encoding can be added later
// without breaking the protocol.
message NarTransfer {
  string build_id = 1;
  string store_path = 2;
  oneof payload {
    bytes zstd_nar_chunk = 3;
  }
  bool eof = 4;
}

message TmpDirArchive {
  string build_id = 1;
  bytes zstd_tar_chunk = 2;
  bool eof = 3;
}

message LogChunk {
  string build_id = 1;
  bytes data = 2;
}

message CancelBuild {
  string build_id = 1;
  // Stable identity of the build on the worker; build_id rotates when
  // a build is resumed under a new assignment.
  string dedupe_key = 2;
}

message BuildResult {
  string build_id = 1;
  int32 exit_code = 2;
  // For each output: NAR sha256 and ed25519 signature over
  // "<store_path>:<nar_sha256>". NAR data follows as NarTransfer
  // messages on the worker stream.
  repeated OutputSignature outputs = 3;
  string error = 4;
  // Inner outputs and AddToStore'd paths the build's outputs
  // reference (recursive-nix). The hub verifies the worker signature
  // and registers each in the local store via AddToStoreNar; attach
  // receives an AddedPath event per registered extra.
  repeated ExtraPath extras = 5;
}

// PathInfo plus a worker signature over "<store_path>:<nar_sha256>";
// same trust shape as OutputSignature, but for a real registered path
// rather than a scratch output.
message ExtraPath {
  PathInfoMsg info = 1;
  string signature = 2;
}

message OutputSignature {
  string store_path = 1;
  bytes nar_sha256 = 2;
  // Nix-format signature ("name:base64") over "storePath:narSha256Hex".
  string signature = 3;
}

// Local service between `tribuchet attach` and the hub, served on a unix
// socket. The hub is colocated with nix-daemon, so it reads input store
// paths and topTmpDir directly from disk; attach only sends metadata.
service AttachHub {
  rpc Build(BuildRequest) returns (stream AttachEvent);
}

message BuildRequest {
  string system = 1;
  string builder = 2;
  repeated string args = 3;
  map<string, string> env = 4;
  // Output name -> scratch store path.
  map<string, string> outputs = 5;
  repeated string input_paths = 6;
  string top_tmp_dir = 7;
  string tmp_dir_in_sandbox = 8;
  string store_dir = 9;
  bool fixed_output = 10;
}

message AttachEvent {
  oneof event {
    bytes log = 1;
    OutputNar output = 2;
    int32 exit_code = 3;
    string error = 4;
    // Discard any partially received NAR for this scratch path; the
    // build was handed to another worker attempt and the output will
    // be streamed again from the start.
    string output_restart = 5;
    // Store path the hub registered locally on attach's behalf
    // (recursive-nix extra). Goes into result.json for Nix's output
    // reference scan.
    string added_path = 6;
    // Name of the worker the build was dispatched to, for the client
    // to report where the build runs.
    string dispatched = 7;
  }
}

message OutputNar {
  string store_path = 1;
  bytes zstd_nar_chunk = 2;
  bool eof = 3;
}

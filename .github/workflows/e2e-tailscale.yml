name: e2e-tailscale
run-name: e2e-tailscale @ ${{ github.event.check_run.head_sha || github.sha }}

# Two GitHub-hosted runners join the same tailnet, one runs
# `tribuchet hub` with auth="tailscale", the other runs the worker, and
# a real `nix-build` goes through external-builders end to end.
#
# Runs after buildbot has pushed this commit's outputs to
# cache.thalheim.io, so `nix build` below is a fetch, not a rebuild.
#
# Tailscale setup (one-time, see also Mic92/tribuchet-action README):
#   1. ACL (https://login.tailscale.com/admin/acls):
#        "tagOwners": { "tag:ci": ["autogroup:admin"] }
#      and restrict the grant so a compromised runner cannot pivot:
#        {"src": ["tag:ci"], "dst": ["tag:ci"], "ip": ["*"]}
#   2. OAuth client (https://login.tailscale.com/admin/settings/oauth)
#      with scope "Auth Keys: write", tag `tag:ci`.
#   3. Repo secrets TS_OAUTH_CLIENT_ID / TS_OAUTH_SECRET.

on:
  check_run:
    types: [completed]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  # check_run-triggered runs are attached to the default branch, not the
  # PR commit; we post a commit status back to the tested sha so the
  # result shows up on the PR.
  statuses: write

env:
  NIX_EXTRA_CONF: |
    extra-substituters = https://cache.thalheim.io
    extra-trusted-public-keys = cache.thalheim.io-1:R7msbosLEZKrxk/lKxf9BTjOOH7Ax3H0Qj0/6wiHOgc=
  E2E_SYSTEMS: x86_64-linux aarch64-linux aarch64-darwin

jobs:
  # nixbot reports via the Checks API; only act on its final success.
  # `head_branch` is null when the commit's branch is in a different
  # repository, so fork-PR heads are skipped — otherwise their
  # checked-out flake and scripts would run with tailnet access. Own
  # branch PRs (push access ⇒ trusted) do run. Also skip when the
  # tailscale secrets are not configured. `secrets` is not usable in a
  # job-level `if`, hence the indirection.
  gate:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.check_run.name == 'buildbot/nix-build'
       && github.event.check_run.conclusion == 'success'
       && github.event.check_run.check_suite.head_branch != null)
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check.outputs.has }}
    steps:
      - id: check
        env:
          TS: ${{ secrets.TS_OAUTH_SECRET }}
        run: echo "has=$([ -n "$TS" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - if: steps.check.outputs.has == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.check_run.head_sha || github.sha }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/$SHA" \
            -f state=pending -f context=e2e-tailscale \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  hub:
    needs: gate
    if: needs.gate.outputs.has-secrets == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.check_run.head_sha || github.sha }}

      - uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc
        with:
          extra-conf: ${{ env.NIX_EXTRA_CONF }}

      - uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          hostname: tribuchet-hub-${{ github.run_id }}

      - run: nix build .#default

      - run: python3 .github/scripts/e2e/run.py hub-start --systems $E2E_SYSTEMS

      - uses: actions/upload-artifact@v4
        with:
          name: hub-addr-${{ github.run_id }}-${{ github.run_attempt }}
          path: addr.txt
          retention-days: 1

      - run: python3 .github/scripts/e2e/run.py hub-build --systems $E2E_SYSTEMS

      - if: always()
        run: cat hub.log || true

  worker:
    needs: gate
    if: needs.gate.outputs.has-secrets == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: ubuntu-24.04-arm
            system: aarch64-linux
          - os: macos-latest
            system: aarch64-darwin
    runs-on: ${{ matrix.os }}
    name: worker (${{ matrix.system }})
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.check_run.head_sha || github.sha }}

      - uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc
        with:
          extra-conf: ${{ env.NIX_EXTRA_CONF }}

      - uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          hostname: tribuchet-worker-${{ matrix.system }}-${{ github.run_id }}

      - run: nix build .#default

      - name: fetch hub address
        run: |
          python3 .github/scripts/e2e/run.py fetch-artifact \
            "hub-addr-${{ github.run_id }}-${{ github.run_attempt }}" addr
          echo "HUB_TS_IP=$(cat addr/addr.txt)" >> "$GITHUB_ENV"

      - run: python3 .github/scripts/e2e/run.py worker --hub-ip "$HUB_TS_IP"

      - if: always()
        run: cat worker.log || true

  report:
    needs: [gate, hub, worker]
    if: always() && needs.gate.outputs.has-secrets == 'true'
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.check_run.head_sha || github.sha }}
          STATE: ${{ (needs.hub.result == 'success' && needs.worker.result == 'success') && 'success' || 'failure' }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/$SHA" \
            -f state="$STATE" -f context=e2e-tailscale \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

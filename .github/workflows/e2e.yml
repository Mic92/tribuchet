name: e2e
run-name: e2e @ ${{ github.event.pull_request.head.sha || github.sha }}

# Two GitHub-hosted runners join the same tailnet, one runs
# `tribuchet hub` with auth="tailscale", the other runs the worker, and
# a real `nix-build` goes through external-builders end to end. buildbot
# readiness (its cache.thalheim.io push, so `nix build` is a fetch, not a
# rebuild) is awaited inside the job via wait-buildbot.
#
# Triggers: push to main and to gitea-mq's merge-queue branches
# (gitea-mq/*) runs in a trusted context with a writable Actions cache
# token (unlike check_run), so hestia populates the caches every build
# fetches; the mq branches are where the queue tests a merge before it
# lands on main. pull_request covers PRs; fork PRs run without secrets, so
# the gate skips the tailnet jobs and untrusted code never reaches it.
#
# Tailscale setup (one-time, see also Mic92/tribuchet-action README):
#   1. ACL (https://login.tailscale.com/admin/acls):
#        "tagOwners": { "tag:ci": ["autogroup:admin"] }
#      and restrict the grant so a compromised runner cannot pivot:
#        {"src": ["tag:ci"], "dst": ["tag:ci"], "ip": ["*"]}
#   2. OAuth client (https://login.tailscale.com/admin/settings/oauth)
#      with scope "Auth Keys: write", tag `tag:ci`.
#   3. Repo secrets TS_OAUTH_CLIENT_ID / TS_OAUTH_SECRET.
on:
  pull_request:
  push:
    branches:
      - main
      - "gitea-mq/**"

# A new event on the same ref supersedes the in-flight e2e.
concurrency:
  group: e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  # the wait-buildbot step reads the buildbot check run via the Checks API
  checks: read

env:
  NIX_EXTRA_CONF: |
    extra-substituters = https://cache.thalheim.io
    extra-trusted-public-keys = cache.thalheim.io-1:R7msbosLEZKrxk/lKxf9BTjOOH7Ax3H0Qj0/6wiHOgc=
  E2E_SYSTEMS: x86_64-linux aarch64-linux aarch64-darwin
  # The tested commit: a PR's head (not the synthetic merge sha) or the
  # pushed commit. buildbot's check run is keyed on it.
  E2E_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  # Gate the rest of the workflow on the tailscale secrets being present;
  # `secrets` is not usable in a job-level `if`, hence the indirection
  # through an output. Fork PRs run without secrets, so this also keeps
  # untrusted code off the tailnet.
  gate:
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check.outputs.has }}
    steps:
      - id: check
        env:
          TS: ${{ secrets.TS_OAUTH_SECRET }}
        run: echo "has=$([ -n "$TS" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  hub:
    needs: gate
    if: needs.gate.outputs.has-secrets == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.E2E_SHA }}

      - uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc
        with:
          extra-conf: ${{ env.NIX_EXTRA_CONF }}

      # GHA-cache layer over cache.thalheim.io.
      - uses: Mic92/hestia-beta@v2.0.0-beta.1
        with:
          version: v2.0.0-beta.1

      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          hostname: tribuchet-hub-${{ github.run_id }}

      # nixbot's cache push lands shortly after buildbot succeeds.
      - run: python3 .github/scripts/e2e/run.py wait-buildbot "$E2E_SHA"

      - run: nix build .#default

        # E2E_SYSTEMS is a space-separated list, meant to word-split.
      - run: |
          # shellcheck disable=SC2086
          python3 .github/scripts/e2e/run.py hub-start --systems $E2E_SYSTEMS

      - uses: actions/upload-artifact@v7
        with:
          name: hub-addr-${{ github.run_id }}-${{ github.run_attempt }}
          path: addr.txt
          retention-days: 1

        # E2E_SYSTEMS is a space-separated list, meant to word-split.
      - run: |
          # shellcheck disable=SC2086
          python3 .github/scripts/e2e/run.py hub-build --systems $E2E_SYSTEMS

      - if: always()
        run: cat hub.log || true

  worker:
    needs: gate
    if: needs.gate.outputs.has-secrets == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
            slug: x86-64-linux
          - os: ubuntu-24.04-arm
            system: aarch64-linux
            slug: aarch64-linux
          - os: macos-latest
            system: aarch64-darwin
            slug: aarch64-darwin
    runs-on: ${{ matrix.os }}
    name: worker (${{ matrix.system }})
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.E2E_SHA }}

      - uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc
        with:
          extra-conf: ${{ env.NIX_EXTRA_CONF }}

      # GHA-cache layer over cache.thalheim.io.
      - uses: Mic92/hestia-beta@v2.0.0-beta.1
        with:
          version: v2.0.0-beta.1

      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          # Tailscale hostnames are DNS labels; matrix.system can
          # contain '_' (x86_64-linux), so use the sanitised slug.
          hostname: tw-${{ matrix.slug }}-${{ github.run_id }}

      # nixbot's cache push lands shortly after buildbot succeeds.
      - run: python3 .github/scripts/e2e/run.py wait-buildbot "$E2E_SHA"

      - run: nix build .#default

      - name: fetch hub address
        run: |
          python3 .github/scripts/e2e/run.py fetch-artifact \
            "hub-addr-${{ github.run_id }}-${{ github.run_attempt }}" addr
          echo "HUB_TS_IP=$(cat addr/addr.txt)" >> "$GITHUB_ENV"

      - run: python3 .github/scripts/e2e/run.py worker --hub-ip "$HUB_TS_IP"

      - if: always()
        run: cat worker.log || true

<svg xmlns="http://www.w3.org/2000/svg" width="820" height="430" viewBox="0 0 820 430" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#374151"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="820" height="430" fill="#f9fafb"/>
  <text x="410" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Tribuchet</text>

  <!-- Client machine boundary -->
  <rect x="30" y="64" width="340" height="330" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="50" y="88" font-size="13" font-weight="700" fill="#4338ca">Client machine</text>

  <rect x="70" y="104" width="260" height="52" rx="8" fill="#ffffff" stroke="#374151"/>
  <text x="200" y="135" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">nix-daemon</text>

  <rect x="70" y="196" width="260" height="52" rx="8" fill="#ffffff" stroke="#374151"/>
  <text x="200" y="227" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">attach (shim)</text>

  <rect x="70" y="288" width="260" height="68" rx="8" fill="#ffffff" stroke="#374151"/>
  <text x="200" y="318" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">hub</text>
  <text x="200" y="338" text-anchor="middle" font-size="11" fill="#6b7280">queue · dedupe · NAR transfer</text>

  <line x1="200" y1="156" x2="200" y2="196" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="210" y="180" font-size="10" fill="#6b7280">exec</text>
  <line x1="200" y1="248" x2="200" y2="288" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="210" y="272" font-size="10" fill="#6b7280">unix socket</text>

  <!-- Worker pool -->
  <rect x="450" y="64" width="340" height="330" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="470" y="88" font-size="13" font-weight="700" fill="#047857">Worker pool</text>

  <rect x="490" y="288" width="260" height="68" rx="8" fill="#ffffff" stroke="#374151"/>
  <text x="620" y="318" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">worker</text>
  <text x="620" y="338" text-anchor="middle" font-size="11" fill="#6b7280">sandbox · imports · signs outputs</text>

  <rect x="505" y="196" width="260" height="52" rx="8" fill="#ffffff" stroke="#9ca3af" stroke-dasharray="4 3"/>
  <text x="635" y="227" text-anchor="middle" font-size="13" font-weight="700" fill="#9ca3af">worker …</text>

  <!-- gRPC -->
  <line x1="330" y1="312" x2="490" y2="316" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="490" y1="328" x2="330" y2="332" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="410" y="312" text-anchor="middle" font-size="11" font-weight="700" fill="#2563eb">gRPC / mTLS</text>

  <!-- CA -->
  <rect x="320" y="396" width="180" height="30" rx="8" fill="#fff7ed" stroke="#ea580c"/>
  <text x="410" y="416" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">ca — certificates</text>
</svg>
